<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Header template</title>
  </head>
  <body>
    <template>
      <header class="site-header" role="banner">
        <div class="wrapper">
          <a class="site-title" rel="author" href="/">Albert Mata</a>
          <button class="theme-toggle" type="button" aria-label="Switch theme">
            <svg class="theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4"></circle>
              <path
                d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"
              ></path>
            </svg>
            <svg class="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.5 14.2A8.5 8.5 0 0 1 9.8 3.5a8.5 8.5 0 1 0 10.7 10.7Z"></path>
            </svg>
          </button>
          <nav class="site-nav" aria-label="Main navigation">
            <input type="checkbox" id="nav-trigger" class="nav-trigger" />
            <label for="nav-trigger" aria-label="Open navigation menu">
              <span class="menu-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 6.5h16M4 12h16M4 17.5h16"></path>
                </svg>
              </span>
            </label>
            <div class="trigger">
              <a class="page-link" href="/">Home</a>
              <a class="page-link" href="/profile/">Profile</a>
              <a class="page-link" href="/privacy/">Privacy</a>
            </div>
          </nav>
        </div>
      </header>
    </template>
  </body>
</html>
